<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Layanan Kesehatan</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f8fb;
        }
        .hero {
            background: linear-gradient(135deg, #0d6efd, #66b2ff);
            color: white;
            padding: 100px 0;
            text-align: center;
        }
        .card {
            border-radius: 12px;
        }
        .icon {
            font-size: 40px;
        }
        footer {
            background: #0d6efd;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">SehatCare</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="container">
        <h1 class="fw-bold">Layanan Kesehatan Terpercaya</h1>
        <p class="lead">Kesehatan Anda adalah prioritas kami</p>
        <button class="btn btn-light btn-lg">Pelajari Lebih</button>
    </div>
</section>

<!-- Layanan -->
<div class="container mt-5 mb-5">
    <h2 class="text-center mb-4">Layanan Kami</h2>
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow text-center p-3">
                <div class="icon">🩺</div>
                <h5>Konsultasi Dokter</h5>
                <p>Layanan konsultasi dengan dokter profesional.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-3">
                <div class="icon">💊</div>
                <h5>Apotek</h5>
                <p>Penyedia obat lengkap dan terpercaya.</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-3">
                <div class="icon">🚑</div>
                <h5>Ambulans</h5>
                <p>Layanan darurat 24 jam siap membantu.</p>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="text-white text-center p-3">
     SehatCare
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
